name: trinitycore

services:
  db:
    image: mysql:8.0
    container_name: tc-db
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      TC_DB_USER: ${TC_DB_USER:-trinity}
      TC_DB_PASSWORD: ${TC_DB_PASSWORD:-trinity}
      TC_AUTH_DB: ${TC_AUTH_DB:-auth}
      TC_CHARACTERS_DB: ${TC_CHARACTERS_DB:-characters}
      TC_WORLD_DB: ${TC_WORLD_DB:-world}
      TC_HOTFIX_DB: ${TC_HOTFIX_DB:-hotfixes}
    volumes:
      - db-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-rootpass}"]
      interval: 10s
      timeout: 5s
      retries: 20
    ports:
      - "${MYSQL_PORT:-3306}:3306"

  bnetserver:
    build:
      context: .
      dockerfile: docker/trinitycore/Dockerfile
      args:
        BUILD_JOBS: ${BUILD_JOBS:-}
    image: trinitycore:local
    container_name: tc-bnetserver
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      TC_DB_HOST: db
      TC_DB_PORT: 3306
      TC_DB_USER: ${TC_DB_USER:-trinity}
      TC_DB_PASSWORD: ${TC_DB_PASSWORD:-trinity}
      TC_AUTH_DB: ${TC_AUTH_DB:-auth}
      TC_LOGIN_REST_PORT: ${LOGIN_REST_PORT:-8081}
    entrypoint: ["/usr/local/bin/bnetserver-entrypoint.sh"]
    volumes:
      - logs:/opt/trinitycore/logs
      # Live-mount entrypoints so logic changes apply on restart (no rebuild).
      - ./docker/bnetserver/entrypoint.sh:/usr/local/bin/bnetserver-entrypoint.sh:ro
      - ./docker/common/entrypoint-lib.sh:/usr/local/lib/entrypoint-lib.sh:ro
    ports:
      - "${BNET_PORT:-1119}:1119"
      - "${LOGIN_REST_PORT:-8081}:8081"

  worldserver:
    # Reuses the image built by the bnetserver service.
    image: trinitycore:local
    container_name: tc-worldserver
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      TC_DB_HOST: db
      TC_DB_PORT: 3306
      TC_DB_USER: ${TC_DB_USER:-trinity}
      TC_DB_PASSWORD: ${TC_DB_PASSWORD:-trinity}
      TC_AUTH_DB: ${TC_AUTH_DB:-auth}
      TC_CHARACTERS_DB: ${TC_CHARACTERS_DB:-characters}
      TC_WORLD_DB: ${TC_WORLD_DB:-world}
      TC_HOTFIX_DB: ${TC_HOTFIX_DB:-hotfixes}
      TC_DATA_DIR: /data
      # Set TC_TDB_URL to auto-download the matching TDB release on first run.
      TC_TDB_URL: ${TC_TDB_URL:-}
      # SOAP remote console, used by the ./tc helper CLI (account/cmd).
      TC_SOAP_ENABLED: ${TC_SOAP_ENABLED:-1}
      TC_SOAP_PORT: ${TC_SOAP_PORT:-7878}
      # Custom: Death QoL (docs/superpowers/specs/2026-06-20-death-qol-design.md).
      # Enabled by default on this dev server; set to 0 to restore vanilla death.
      TC_ALLOW_CHAT_WHILE_DEAD: ${TC_ALLOW_CHAT_WHILE_DEAD:-1}
      TC_PLAYER_AUTO_REVIVE_AT_CORPSE: ${TC_PLAYER_AUTO_REVIVE_AT_CORPSE:-1}
      TC_PLAYER_AUTO_REVIVE_DELAY_MS: ${TC_PLAYER_AUTO_REVIVE_DELAY_MS:-5000}
      TC_BOT_AUTO_REVIVE: ${TC_BOT_AUTO_REVIVE:-1}
      TC_BOT_AUTO_REVIVE_DELAY_MS: ${TC_BOT_AUTO_REVIVE_DELAY_MS:-5000}
    entrypoint: ["/usr/local/bin/worldserver-entrypoint.sh"]
    # worldserver exposes an interactive console; keep stdin open.
    stdin_open: true
    tty: true
    volumes:
      # Map data lives in a named volume (WSL2 fs) — Windows bind mounts are
      # ~500x slower for the many small map/vmap/mmap files. See `data` below.
      - data:/data
      - logs:/opt/trinitycore/logs
      # Live-mount entrypoints so logic changes apply on restart (no rebuild).
      - ./docker/worldserver/entrypoint.sh:/usr/local/bin/worldserver-entrypoint.sh:ro
      - ./docker/common/entrypoint-lib.sh:/usr/local/lib/entrypoint-lib.sh:ro
    ports:
      - "${WORLD_PORT:-8085}:8085"
      - "${SOAP_PORT:-7878}:7878"

  # One-off helper to extract client data from a mounted WoW client.
  # Usage: docker compose run --rm extractor
  extractor:
    image: trinitycore:local
    profiles: ["tools"]
    entrypoint: ["/data/extract-client-data.sh"]
    working_dir: /wow
    volumes:
      - ${WOW_CLIENT_DIR:-./wow-client}:/wow
      - data:/out
      - ./scripts/extract-client-data.sh:/data/extract-client-data.sh:ro
    environment:
      OUTPUT_DIR: /out

volumes:
  db-data:
  logs:
  # Pre-populated from ./data; external so `docker compose down -v` won't wipe
  # the ~24GB of extracted client data. Repopulate via the extractor if needed.
  data:
    external: true
    name: trinitycore_data
